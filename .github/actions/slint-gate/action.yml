name: slint-gate
description: >
  Evaluate a kube-slint policy gate against a sli-summary.json produced by
  the kube-slint harness. Fails the job on FAIL or NO_GRADE by default.
  Requires Go to be installed in the calling workflow (actions/setup-go).

inputs:
  measurement-summary:
    description: Path to sli-summary.json (relative to workspace)
    required: false
    default: artifacts/sli-summary.json

  policy:
    description: Path to .slint/policy.yaml (relative to workspace)
    required: false
    default: .slint/policy.yaml

  baseline:
    description: Optional path to baseline summary JSON (relative to workspace)
    required: false
    default: ''

  output:
    description: Output path for slint-gate-summary.json (relative to workspace)
    required: false
    default: slint-gate-summary.json

  exit-on:
    description: >
      Gate result level that fails the job. Preferred over the deprecated
      fail-on input (both are honored; exit-on wins if both are set).
      NEVER                — never fail the job; only inspect gate-result output.
      FAIL                 — only hard violations fail.
      FAIL_OR_WARN         — treat WARN as a failure too.
      FAIL_OR_NOGRADE      — treat NO_GRADE (missing measurement) as failure.
      FAIL_WARN_OR_NOGRADE — treat WARN and NO_GRADE as failures.
    required: false
    default: ''

  fail-on:
    description: >
      Deprecated: use exit-on instead. Same values as exit-on.
    required: false
    default: FAIL_OR_NOGRADE

  github-step-summary:
    description: Append a Markdown result table to $GITHUB_STEP_SUMMARY
    required: false
    default: 'true'

  upload-artifact:
    description: Upload slint-gate-summary.json as a workflow artifact
    required: false
    default: 'true'

  artifact-name:
    description: Name for the uploaded artifact
    required: false
    default: slint-gate-summary

outputs:
  gate-result:
    description: Gate evaluation result — PASS | WARN | FAIL | NO_GRADE
    value: ${{ steps.run-gate.outputs.gate_result }}

  evaluation-status:
    description: Evaluation completeness — evaluated | partially_evaluated | not_evaluated
    value: ${{ steps.run-gate.outputs.evaluation_status }}

  summary-path:
    description: Absolute path to the written slint-gate-summary.json
    value: ${{ steps.run-gate.outputs.summary_path }}

runs:
  using: composite
  steps:
    - name: Run slint-gate
      id: run-gate
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_MEASUREMENT: ${{ inputs.measurement-summary }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_STEP_SUMMARY: ${{ inputs.github-step-summary }}
        INPUT_EXIT_ON: ${{ inputs.exit-on }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        set -euo pipefail

        # Always run the CLI with --exit-on NEVER so it never os.Exit(1)s here.
        # The pass/fail decision for the job is made only in the final "Check
        # gate result" step, after outputs/artifact are already captured —
        # this guarantees diagnostics survive a policy failure instead of the
        # CLI's own exit code short-circuiting the rest of this composite
        # action's steps.
        EXTRA=""
        if [ "${INPUT_STEP_SUMMARY}" = "true" ]; then
          EXTRA="--github-step-summary"
        fi

        go run "${ACTION_PATH}/../../../cmd/slint-gate" \
          --summary  "${INPUT_MEASUREMENT}" \
          --policy   "${INPUT_POLICY}" \
          --baseline "${INPUT_BASELINE}" \
          --output   "${INPUT_OUTPUT}" \
          --exit-on  NEVER \
          ${EXTRA}

        GATE=$(jq -r '.gate_result'        "${INPUT_OUTPUT}")
        EVAL=$(jq -r '.evaluation_status'  "${INPUT_OUTPUT}")
        ABS_PATH="$(realpath "${INPUT_OUTPUT}")"

        echo "gate_result=${GATE}"        >> "${GITHUB_OUTPUT}"
        echo "evaluation_status=${EVAL}"  >> "${GITHUB_OUTPUT}"
        echo "summary_path=${ABS_PATH}"   >> "${GITHUB_OUTPUT}"

    - name: Upload gate summary artifact
      if: always() && inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ github.workspace }}/${{ inputs.output }}
        retention-days: 30
        overwrite: true

    - name: Check gate result
      if: always()
      shell: bash
      env:
        GATE_RESULT: ${{ steps.run-gate.outputs.gate_result }}
        INPUT_EXIT_ON: ${{ inputs.exit-on }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        set -euo pipefail
        echo "slint-gate result: ${GATE_RESULT}"

        RESOLVED_EXIT_ON="${INPUT_EXIT_ON:-$INPUT_FAIL_ON}"

        case "${RESOLVED_EXIT_ON}" in
          NEVER)
            ;;
          FAIL)
            if [ "${GATE_RESULT}" = "FAIL" ]; then
              echo "::error::slint-gate FAIL — policy violation detected."
              exit 1
            fi
            ;;
          FAIL_OR_WARN)
            if [ "${GATE_RESULT}" = "FAIL" ] || [ "${GATE_RESULT}" = "WARN" ]; then
              echo "::error::slint-gate ${GATE_RESULT} treated as failure (exit-on=${RESOLVED_EXIT_ON})."
              exit 1
            fi
            ;;
          FAIL_OR_NOGRADE)
            if [ "${GATE_RESULT}" = "FAIL" ] || [ "${GATE_RESULT}" = "NO_GRADE" ]; then
              echo "::error::slint-gate ${GATE_RESULT} treated as failure (exit-on=${RESOLVED_EXIT_ON})."
              exit 1
            fi
            ;;
          FAIL_WARN_OR_NOGRADE)
            if [ "${GATE_RESULT}" = "FAIL" ] || [ "${GATE_RESULT}" = "WARN" ] || [ "${GATE_RESULT}" = "NO_GRADE" ]; then
              echo "::error::slint-gate ${GATE_RESULT} treated as failure (exit-on=${RESOLVED_EXIT_ON})."
              exit 1
            fi
            ;;
          *)
            echo "::error::invalid exit-on value: ${RESOLVED_EXIT_ON}"
            exit 2
            ;;
        esac

        echo "slint-gate ${GATE_RESULT} — continuing."
