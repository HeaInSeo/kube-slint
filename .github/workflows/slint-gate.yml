name: slint-gate

on:
  workflow_dispatch:
    inputs:
      measurement_summary_path:
        description: "Path to measurement summary JSON"
        required: false
        default: "artifacts/sli-summary.json"
      baseline_path:
        description: "Optional path to baseline summary JSON"
        required: false
        default: ""
      policy_path:
        description: "Path to policy YAML"
        required: false
        default: ".slint/policy.yaml"
  pull_request:
    paths:
      - ".github/workflows/slint-gate.yml"
      - ".github/actions/slint-gate/**"
      - "cmd/slint-gate/**"
      - "internal/gate/**"
      - ".slint/**"
  push:
    paths:
      - ".github/workflows/slint-gate.yml"
      - ".github/actions/slint-gate/**"
      - "cmd/slint-gate/**"
      - "internal/gate/**"
      - ".slint/**"

permissions:
  contents: read

concurrency:
  group: slint-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slint-gate:
    name: Evaluate slint policy gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run slint-gate
        uses: ./.github/actions/slint-gate
        with:
          measurement-summary: ${{ github.event.inputs.measurement_summary_path || 'artifacts/sli-summary.json' }}
          policy:              ${{ github.event.inputs.policy_path || '.slint/policy.yaml' }}
          baseline:            ${{ github.event.inputs.baseline_path || '' }}
          output:              slint-gate-summary.json
          fail-on:             FAIL
          github-step-summary: 'true'
          upload-artifact:     'true'
