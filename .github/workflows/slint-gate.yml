name: slint-gate

on:
  workflow_dispatch:
    inputs:
      measurement_summary_path:
        description: "Path to measurement summary JSON"
        required: false
        default: "artifacts/sli-summary.json"
      baseline_path:
        description: "Optional path to baseline summary JSON"
        required: false
        default: ""
      policy_path:
        description: "Path to policy YAML"
        required: false
        default: ".slint/policy.yaml"
  pull_request:
    paths:
      - ".github/workflows/slint-gate.yml"
      - "hack/slint_gate.py"
      - "cmd/slint-gate/**"
      - "internal/gate/**"
      - ".slint/**"
      - "docs/notes/slint-gate-*.md"
      - "docs/DECISIONS.md"
      - "docs/PROGRESS_LOG.md"
  push:
    paths:
      - ".github/workflows/slint-gate.yml"
      - "hack/slint_gate.py"
      - "cmd/slint-gate/**"
      - "internal/gate/**"
      - ".slint/**"
      - "docs/notes/slint-gate-*.md"
      - "docs/DECISIONS.md"
      - "docs/PROGRESS_LOG.md"

permissions:
  contents: read

concurrency:
  group: slint-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slint-gate:
    name: Evaluate slint policy gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MEASUREMENT_SUMMARY_PATH: ${{ github.event.inputs.measurement_summary_path || 'artifacts/sli-summary.json' }}
      BASELINE_PATH: ${{ github.event.inputs.baseline_path || '' }}
      POLICY_PATH: ${{ github.event.inputs.policy_path || '.slint/policy.yaml' }}
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run slint-gate evaluator
        run: |
          go run ./cmd/slint-gate \
            --measurement-summary "${MEASUREMENT_SUMMARY_PATH}" \
            --policy "${POLICY_PATH}" \
            --baseline "${BASELINE_PATH}" \
            --output "slint-gate-summary.json" \
            --github-step-summary

      - name: Upload slint-gate summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: slint-gate-summary
          path: slint-gate-summary.json
          retention-days: 30
          overwrite: true

      - name: Fail job on policy violation
        run: |
          gate=$(jq -r '.gate_result' slint-gate-summary.json)
          echo "gate_result=${gate}"
          if [ "${gate}" = "FAIL" ]; then
            echo "slint-gate detected policy violation; failing job."
            exit 1
          fi
          echo "slint-gate non-fail result; job succeeds."
