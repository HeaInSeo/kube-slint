name: E2E Tests

# kube-slint는 라이브러리/프레임워크 repo다.
# "E2E"는 실제 오퍼레이터 배포가 아닌, httptest.Server 기반 harness 통합 테스트를 의미한다.
# (make test-e2e → go test ./test/e2e/ -run TestHarnessIntegration_TableDriven -v)
# Kind 클러스터, docker 빌드, kubectl 등은 이 repo에서 불필요하다.

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - ".github/**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - ".github/**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-e2e:
    name: Run harness integration tests (mock-based)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # harness 통합 테스트: httptest.Server로 /metrics 응답을 시뮬레이션.
      # Kind 클러스터, 실제 오퍼레이터 배포 없이 SLI 파이프라인 전체를 검증한다.
      # SLINT_DISABLE_DISCOVERY: .slint.yaml 자동 탐색 비활성 (CI 환경 격리)
      - name: Run E2E integration tests
        env:
          SLINT_DISABLE_DISCOVERY: "1"
        run: make test-e2e
