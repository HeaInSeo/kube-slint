# kube-slint scrapes metrics by launching a curl pod in the target namespace.
# This ServiceAccount + namespace-scoped Role gives curl pods the minimum
# permissions needed, confined to the hello-system namespace (no cluster-wide
# binding — see docs/post-rc-hardening-design.md RBAC scope decision).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-slint
  namespace: hello-system
---
# curl pods need to GET pods/exec and pods (to launch and track the curl pod).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kube-slint-scraper
  namespace: hello-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-slint-scraper
  namespace: hello-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kube-slint-scraper
subjects:
  - kind: ServiceAccount
    name: kube-slint
    namespace: hello-system
