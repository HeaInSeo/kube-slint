current_focus:
  - "2026-07-16: D-029 through D-032 real-usage SLI governance hardening sprint in progress. Sprint A shipped advisory slint-gate inspect policy coverage diagnostics and source-neutral README wording. Sprint B shipped pkg/slo/fetch/jsonendpoint as a source-neutral HTTP JSON/expvar SnapshotFetcher. Sprint C added fetch.WindowFetcher, ExecuteRequest.WindowFetcher, SessionConfig.WindowFetcher, scalar window compute modes window_min/window_max/window_avg/window_p95/window_p99/window_ratio, and pkg/slo/fetch/promrange for Prometheus query_range. Gate policy coverage governance is now opt-in via policy.coverage.required/informational and promote_to_fail coverage_gap. Not shipped yet: histogram quantiles, specialized burn-rate semantics beyond generic window_ratio, and higher-level onboarding for window policies."
  - "v1.6.0 tagged: internal-usage backlog batch closing 4 of 5 deferred items (MCP/IDE integration intentionally excluded, still deferred). pkg/gate/gate.go (866 lines) split into 7 per-concern files. Deduplicated 3 copies of Summary-to-value-map flattening and 2 copies each of operator-comparison/direction-inference logic into summary.Summary.ResultValues()/gate.CompareOp/gate.LowerIsBetter/gate.HigherIsBetter (D-022) - no standalone pkg/policy package created, since gate.Policy et al have zero external consumers. F4 fixed: promtext parser no longer breaks on label values containing spaces. baseline merge review-existing/force-replace modes implemented (D-023), append-new-only remains default. slint-gate wizard added: real interactive onboarding, hard-refuses non-TTY stdin via golang.org/x/term.IsTerminal (D-024)."
  - "v1.6.0 tagged: second and third pre-release-adversarial-review rounds against the batch above, each preceded by a failed first attempt (session rate limit hit all 7 agents, a non-result not a clean pass - retried both times). Combined 16 confirmed findings, all fixed, none deferred. Most significant: HIGH-severity PodSpec/JSON injection in curlpod's RunOnce via unescaped serviceAccountName/Image (D-025), and a HIGH-severity reliability bug where WaitDone treated pod phase Succeeded/Failed identically so a failed scrape was silently reported as a successful empty measurement, contradicting the documented reliability contract (D-027, fixed with real logic - the project's core value proposition). Also fixed: inspect/quickstart CLI dispatch silently swallowing errors; both READMEs and competition-submission.md self-referentially calling --summary its own deprecated alias / citing a stale version / missing the wizard mention; the GitHub composite action and ci github-actions generator both missing/emitting the wrong summary key; kubectl delete pod/pods spelling inconsistency; 6 total copies of a captureStdout/captureStderr pipe-buffer test deadlock (D-026, D-028); stale internal/gate (D-012) and attach.go Config doc drift. Permanent guardrails added for every pattern-fixable finding."
  - "v1.5.3 tagged: pre-release-adversarial-review workflow (D-021) found and fixed 8 real issues CI green had been reporting as healthy (baseline merge overwrite guard, kube-system namespace guard on Cleanup/SweepOrphans, silent kubectl-error swallowing x2, gate.go IO-error surfacing, README InsideAnnotation caveat, StrictnessMode doc gap, and two flag renames: analyze-dataplane --fail-on -> --severity-threshold, gate --measurement-summary -> --summary, both dual-supported); permanent guardrail checks added for the repeatable-pattern findings; also includes go.mod's go directive lowered from an exact-patch pin (1.25.5) to 1.22 for consumer compatibility (D-020) and CLAUDE.md/AGENTS.md untracked from the public repo (local-only, same pattern as .codex/)"
