schema_version: "slint.policy.v1"

thresholds:
  - name: "reconcile_total_delta_min"
    metric: "reconcile_total_delta"
    operator: ">="
    value: 1
  - name: "workqueue_depth_end_max"
    metric: "workqueue_depth_end"
    operator: "<="
    value: 5

regression:
  enabled: true
  tolerance_percent: 5

reliability:
  required: false
  min_level: "partial"

fail_on:
  - "threshold_miss"
  - "regression_detected"
