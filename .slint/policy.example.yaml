# kube-slint policy example
# Supported fields: thresholds, regression, reliability, fail_on
# Copy this file to .slint/policy.yaml and adjust for your operator.

schema_version: "slint.policy.v1"

# Threshold checks: gate on absolute SLI values.
# 'metric' must match an SLI ID from your sli-summary.json.
# 'operator' supports: >=, <=, >, <, ==
thresholds:
  - name: "reconcile_error_ratio_max"
    metric: "reconcile_error_delta"
    operator: "<="
    value: 0

# Regression detection: compare current run against a stored baseline.
# Pass --baseline <path> to slint-gate to enable comparison.
regression:
  enabled: true
  tolerance_percent: 5

# Reliability: require a minimum collection quality before evaluating.
reliability:
  required: false
  min_level: "partial"  # "partial" or "complete"

# fail_on controls which violation categories promote the gate_result to FAIL.
# Violations not listed here become gate_result=WARN instead of PASS.
# Process exit behavior is controlled separately by the slint-gate CLI --fail-on flag.
#
# If fail_on is omitted or empty, kube-slint uses the default hard-fail categories:
# threshold_miss and regression_detected.
#
# Remove "regression_detected" to downgrade regression violations to WARN.
fail_on:
  - "threshold_miss"
  - "regression_detected"
