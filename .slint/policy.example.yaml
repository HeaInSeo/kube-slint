# kube-slint policy example
# Supported fields: thresholds, regression, reliability, promote_to_fail (fail_on is a deprecated alias)
# Copy this file to .slint/policy.yaml and adjust for your operator.

schema_version: "slint.policy.v1"

# Threshold checks: gate on absolute SLI values.
# 'metric' must match an SLI ID from your sli-summary.json.
# 'operator' supports: >=, <=, >, <, ==
thresholds:
  - name: "reconcile_error_ratio_max"
    metric: "reconcile_error_delta"
    operator: "<="
    value: 0

# Regression detection: compare current run against a stored baseline.
# Pass --baseline <path> to slint-gate to enable comparison.
regression:
  enabled: true
  tolerance_percent: 5

# Reliability: require a minimum collection quality before evaluating.
reliability:
  required: false
  min_level: "partial"  # "partial" or "complete"

# promote_to_fail controls which violation categories promote the gate_result
# to FAIL. Violations not listed here become gate_result=WARN instead of PASS.
# Process exit behavior is controlled separately by the slint-gate CLI --exit-on flag.
# (fail_on and --fail-on are the older names for these two; both still work as
# deprecated aliases.)
#
# If promote_to_fail is omitted or empty, kube-slint uses the default
# hard-fail categories: threshold_miss and regression_detected.
#
# Remove "regression_detected" to downgrade regression violations to WARN.
promote_to_fail:
  - "threshold_miss"
  - "regression_detected"
