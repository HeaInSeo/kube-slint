schema_version: "slint.policy.v1"
metadata:
  name: "example-default-policy"
  owner: "kube-slint"

thresholds:
  - name: "reconcile_error_ratio_max"
    metric: "reconcile_error_ratio"
    operator: "<="
    value: 0.02
    severity: "fail"

regression:
  enabled: true
  mode: "percent_delta"
  tolerance_percent: 5

reliability:
  required: false
  min_level: "partial"

first_run:
  default_result: "warn"
  evaluate_thresholds: true
  evaluate_regression: false

baseline:
  required: false
  on_unavailable: "warn"
  on_corrupt: "no_grade"

fail_on:
  - "threshold_miss"
  - "regression_detected"
